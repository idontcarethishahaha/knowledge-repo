name: 推送通知

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 发消息到飞书
        env:
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MSG: ${{ github.event.head_commit.message }}
          URL: ${{ github.event.compare }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          PUSH_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          DATE=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          dt = datetime.fromisoformat('${PUSH_DATE}').astimezone(timezone(timedelta(hours=8)))
          print(dt.strftime('%Y-%m-%d %H:%M'))
          ")

          if git cat-file -e "${BEFORE}" 2>/dev/null; then
            STATS=$(git diff --stat "${BEFORE}..${AFTER}" | tail -1)
            ADDED=$(grep -oP '\d+(?= insertion)' <<< "$STATS" || echo 0)
            DELETED=$(grep -oP '\d+(?= deletion)' <<< "$STATS" || echo 0)
            # sed '$d' 去掉最后一行汇总，只留文件列表
            RAW_FILES=$(git diff --stat "${BEFORE}..${AFTER}" | sed '$d')
          else
            ADDED=$(git diff --stat 4b825dc642cb6eb9a060e54bf8993c6d42adeeec HEAD | tail -1 | grep -oP '\d+(?= insertion)' || echo 0)
            DELETED=0
            RAW_FILES=$(git diff --stat 4b825dc642cb6eb9a060e54bf8993c6d42adeeec HEAD | sed '$d')
          fi

          FILE_COUNT=$(echo "$RAW_FILES" | wc -l)

          # 格式化每个文件行：提取文件名和变更数，只保留文件名（短的变更数在飞书卡片里不好看）
          FORMATTED=$(echo "$RAW_FILES" | head -5 | while read -r line; do
            FILE=$(echo "$line" | sed 's/|.*//' | xargs)
            echo "• ${FILE}"
          done)

          if [ "$FILE_COUNT" -gt 5 ]; then
            FILE_TEXT="${FORMATTED}
          ... 等 ${FILE_COUNT} 个文件"
          else
            FILE_TEXT="${FORMATTED}"
          fi

          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg author "${AUTHOR}" \
              --arg msg "${MSG}" \
              --arg date "${DATE}" \
              --arg files "${FILE_TEXT}" \
              --arg added "${ADDED}" \
              --arg deleted "${DELETED}" \
              --arg url "${URL}" \
              '{
                msg_type: "interactive",
                card: {
                  header: {
                    title: {
                      tag: "plain_text",
                      content: "📦 知识仓库更新"
                    },
                    template: "blue"
                  },
                  elements: [
                    {
                      tag: "div",
                      fields: [
                        { is_short: true, text: { tag: "lark_md", content: ("**👤 作者**\n" + $author) } },
                        { is_short: true, text: { tag: "lark_md", content: ("**🕐 时间**\n" + $date) } }
                      ]
                    },
                    {
                      tag: "div",
                      fields: [
                        { is_short: false, text: { tag: "lark_md", content: ("**📝 提交信息**\n" + $msg) } }
                      ]
                    },
                    { tag: "hr" },
                    {
                      tag: "div",
                      fields: [
                        { is_short: false, text: { tag: "lark_md", content: ("**📂 变更文件（" + $added + " 新增 / " + $deleted + " 删除）**\n" + $files) } }
                      ]
                    },
                    { tag: "hr" },
                    {
                      tag: "action",
                      actions: [
                        {
                          tag: "button",
                          text: { tag: "plain_text", content: "🔗 查看详情" },
                          type: "primary",
                          url: $url
                        }
                      ]
                    }
                  ]
                }
              }'
            )"
