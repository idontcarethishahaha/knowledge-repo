name: 推送通知

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发消息到微信
        env:
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MSG: ${{ github.event.head_commit.message }}
          URL: ${{ github.event.compare }}
        run: |
          # 多个 SendKey 用英文逗号隔开，例如: sctxxx1,sctxxx2
          IFS=',' read -ra KEYS <<< "${{ secrets.SERVER_CHAN_KEYS }}"

          for KEY in "${KEYS[@]}"; do
            curl -s -X POST "https://sctapi.ftqq.com/${KEY}.send" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg author "${AUTHOR}" \
                --arg msg "${MSG}" \
                --arg url "${URL}" \
                '{
                  title: "📦 知识仓库更新",
                  desp: ($author + " 提交了:\n\n" + $msg + "\n\n[查看详情](" + $url + ")")
                }'
              )"
          done
